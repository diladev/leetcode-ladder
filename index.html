<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetCode Ladder — Dilan</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #181b22;
        --panel-2: #1f232c;
        --ink: #e8eaed;
        --ink-dim: #8b919c;
        --line: #2a2f3a;
        --acc: #ffa116;
        --acc-soft: rgba(255, 161, 22, 0.12);
        --green: #3fb950;
        --green-soft: rgba(63, 185, 80, 0.12);
        --easy: #00b8a3;
        --med: #ffb800;
        --hard: #ff375f;
        --mono:
          "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, Menlo,
          monospace;
        --sans:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        line-height: 1.45;
        padding: 28px 18px 80px;
        max-width: 860px;
        margin: 0 auto;
      }
      header {
        margin-bottom: 24px;
      }
      .title {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.02em;
        display: flex;
        align-items: baseline;
        gap: 10px;
      }
      .title .dot {
        color: var(--acc);
      }
      .subtitle {
        color: var(--ink-dim);
        font-size: 14px;
        margin-top: 4px;
      }

      .overall {
        margin-top: 20px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px 20px;
      }
      .overall-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .overall-count {
        font-family: var(--mono);
        font-size: 15px;
      }
      .overall-count b {
        color: var(--acc);
        font-size: 20px;
      }
      .reset {
        background: transparent;
        color: var(--ink-dim);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 5px 11px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .reset:hover {
        color: var(--hard);
        border-color: var(--hard);
      }
      .bar {
        height: 9px;
        background: var(--panel-2);
        border-radius: 6px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--acc), var(--green));
        border-radius: 6px;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .topic {
        margin-top: 26px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
      }
      .topic-head {
        padding: 16px 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        user-select: none;
      }
      .topic-head:hover {
        background: var(--panel-2);
      }
      .chev {
        color: var(--ink-dim);
        font-size: 13px;
        transition: transform 0.2s;
        width: 12px;
      }
      .topic.open .chev {
        transform: rotate(90deg);
      }
      .topic-name {
        font-size: 17px;
        font-weight: 650;
        flex: 1;
        letter-spacing: -0.01em;
      }
      .topic-prog {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--ink-dim);
      }
      .topic-prog b {
        color: var(--green);
      }

      .group-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        color: var(--ink-dim);
        padding: 14px 10px 6px;
        font-weight: 600;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 9px 10px;
        border-radius: 9px;
        cursor: pointer;
        transition: background 0.12s;
      }
      .row:hover {
        background: var(--panel-2);
      }
      .check {
        width: 21px;
        height: 21px;
        border-radius: 6px;
        border: 2px solid var(--line);
        flex-shrink: 0;
        display: grid;
        place-items: center;
        transition: all 0.15s;
      }
      .row.done .check {
        background: var(--green);
        border-color: var(--green);
      }
      .check svg {
        width: 12px;
        height: 12px;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .row.done .check svg {
        opacity: 1;
      }
      .pname {
        flex: 1;
        font-size: 14.5px;
      }
      .row.done .pname {
        color: var(--ink-dim);
        text-decoration: line-through;
        text-decoration-color: var(--line);
      }
      .tag {
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 2px 8px;
        border-radius: 20px;
        flex-shrink: 0;
      }
      .t-easy {
        color: var(--easy);
        background: rgba(0, 184, 163, 0.12);
      }
      .t-med {
        color: var(--med);
        background: rgba(255, 184, 0, 0.12);
      }
      .t-hard {
        color: var(--hard);
        background: rgba(255, 55, 95, 0.12);
      }
      .lc {
        color: var(--ink-dim);
        font-size: 13px;
        flex-shrink: 0;
        padding: 3px 6px;
        border-radius: 6px;
        text-decoration: none;
      }
      .lc:hover {
        color: var(--acc);
        background: var(--acc-soft);
      }

      footer {
        margin-top: 30px;
        text-align: center;
        color: var(--ink-dim);
        font-size: 12px;
      }
      .saved-note {
        font-family: var(--mono);
      }

      .meta-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .chip {
        font-family: var(--mono);
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: var(--panel-2);
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .chip .rating-num {
        color: var(--acc);
        font-weight: 700;
      }
      .chip .title-name {
        color: var(--ink);
        font-weight: 600;
      }
      .chip.streak {
        color: var(--ink-dim);
      }
      .chip.streak b {
        color: var(--med);
      }
      .next-title {
        font-size: 12px;
        color: var(--ink-dim);
        font-family: var(--mono);
      }
      .toast {
        position: fixed;
        left: 50%;
        bottom: 28px;
        transform: translateX(-50%) translateY(80px);
        background: var(--panel-2);
        border: 1px solid var(--acc);
        color: var(--ink);
        padding: 12px 22px;
        border-radius: 12px;
        font-size: 14.5px;
        font-weight: 600;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
        opacity: 0;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: none;
        z-index: 99;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      .toast .pawn {
        color: var(--acc);
        margin-right: 6px;
      }

      /* check pop */
      @keyframes checkPop {
        0% {
          transform: scale(0.6);
        }
        55% {
          transform: scale(1.25);
        }
        100% {
          transform: scale(1);
        }
      }
      .row.done .check {
        animation: checkPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* floating +points */
      @keyframes floatUp {
        0% {
          opacity: 0;
          transform: translateY(4px) scale(0.8);
        }
        15% {
          opacity: 1;
          transform: translateY(0) scale(1.05);
        }
        100% {
          opacity: 0;
          transform: translateY(-34px) scale(1);
        }
      }
      .pts-pop {
        position: absolute;
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 700;
        color: var(--green);
        pointer-events: none;
        animation: floatUp 0.9s ease-out forwards;
        z-index: 50;
      }

      /* rating pulse on change */
      @keyframes ratingPulse {
        0% {
          transform: scale(1);
        }
        40% {
          transform: scale(1.22);
          color: var(--green);
        }
        100% {
          transform: scale(1);
        }
      }
      .rating-num.pulse {
        display: inline-block;
        animation: ratingPulse 0.45s ease-out;
      }

      /* topic body slide */
      .topic-body {
        display: none;
        padding: 0 12px 10px;
      }
      .topic.open .topic-body {
        display: block;
        animation: bodyIn 0.22s ease-out;
      }
      @keyframes bodyIn {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes floatDown {
        0% {
          opacity: 0;
          transform: translateY(-4px) scale(0.8);
        }
        15% {
          opacity: 1;
          transform: translateY(0) scale(1.05);
        }
        100% {
          opacity: 0;
          transform: translateY(34px) scale(1);
        }
      }
      .pts-pop.neg {
        color: var(--hard);
        animation: floatDown 0.9s ease-out forwards;
      }

      @keyframes iconPop {
        0% {
          transform: scale(1) rotate(0deg);
        }
        40% {
          transform: scale(1.6) rotate(-12deg);
        }
        70% {
          transform: scale(1.15) rotate(6deg);
        }
        100% {
          transform: scale(1) rotate(0deg);
        }
      }
      .title-icon {
        display: inline-block;
        font-size: 15px;
      }
      .title-icon.icon-pop {
        animation: iconPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .toast.demote {
        border-color: var(--hard);
      }
      .toast.demote .pawn {
        color: var(--hard);
      }
    </style>
  </head>

              label: "Greedy",
              problems: [
                { n: "Jump Game", id: 55, d: "med" },
                { n: "Gas Station", id: 134, d: "med" },
              ],
            },
          ],
        },
      ];

      const STORE_KEY = "lc_ladder_dilan_v1";
      let solved = {};

      function load() {
        // In-memory only fallback; persistence handled below if available
        try {
          const raw = localStorage.getItem(STORE_KEY);
          if (raw) solved = JSON.parse(raw);
        } catch (e) {
          solved = {};
        }
      }

      // ---------- Rating & titles (chess-style) ----------
      const PTS = { easy: 8, med: 20, hard: 40 };
      const BASE_RATING = 400;
      // Titles unlock as a fraction of ALL available points, so adding
      // future ladders automatically rebalances the climb.
      const TITLES = [
        [0.0, "Unrated", "\u2659"], // white pawn
        [0.08, "Novice", "\u265F"], // black pawn
        [0.2, "Club Player", "\u265E"], // knight
        [0.35, "Expert", "\u265D"], // bishop
        [0.5, "Candidate Master", "\u265C"], // rook
        [0.65, "FIDE Master", "\u265B"], // queen
        [0.82, "International Master", "\u265A"], // king
        [0.96, "Grandmaster", "\uD83D\uDC51"], // crown
      ];

      const META_KEY = "lc_ladder_dilan_meta_v1";
      let meta = { streak: 0, lastDay: null, titleIdx: 0 };
      try {
        const m = localStorage.getItem(META_KEY);
        if (m) meta = Object.assign(meta, JSON.parse(m));
      } catch (e) {}
      function saveMeta() {
        try {
          localStorage.setItem(META_KEY, JSON.stringify(meta));
        } catch (e) {}
      }

      function allPoints() {
        let max = 0,
          mine = 0;
        DATA.forEach((t, ti) =>
          t.groups.forEach((g, gi) =>
            g.problems.forEach((p, pi) => {
              const v = PTS[p.d] || 0;
              max += v;
              if (solved[keyFor(ti, gi, pi)]) mine += v;
            }),
          ),
        );
        return { mine, max };
      }

      function titleFor(frac) {
        let idx = 0;
        TITLES.forEach(([f], i) => {
          if (frac >= f) idx = i;
        });
        return idx;
      }

      function todayStr() {
        const d = new Date();
        return (
          d.getFullYear() +
          "-" +
          String(d.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(d.getDate()).padStart(2, "0")
        );
      }
      function yesterdayStr() {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        return (
          d.getFullYear() +
          "-" +
          String(d.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(d.getDate()).padStart(2, "0")
        );
      }

      function bumpStreak() {
        const today = todayStr();
        if (meta.lastDay === today) return; // already counted today
        meta.streak = meta.lastDay === yesterdayStr() ? meta.streak + 1 : 1;
        meta.lastDay = today;
        saveMeta();
      }

      function popPoints(ev, pts, negative) {
        const el = document.createElement("span");
        el.className = "pts-pop" + (negative ? " neg" : "");
        el.textContent = (negative ? "\u2212" : "+") + pts;
        el.style.left = ev.pageX + 10 + "px";
        el.style.top = ev.pageY - 18 + "px";
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 900);
      }

      let lastRating = null;
      let toastTimer = null;
      function showToast(msg, demote) {
        const t = document.getElementById("toast");
        t.classList.toggle("demote", !!demote);
        document.getElementById("toastMsg").textContent = msg;
        t.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove("show"), 3200);
      }

      function renderMeta() {
        const { mine, max } = allPoints();
        const frac = max ? mine / max : 0;
        const rating = BASE_RATING + mine;
        const idx = titleFor(frac);

        const rEl = document.getElementById("ratingNum");
        rEl.textContent = rating;
        if (lastRating !== null && rating > lastRating) {
          rEl.classList.remove("pulse");
          void rEl.offsetWidth; // restart animation
          rEl.classList.add("pulse");
        }
        lastRating = rating;
        document.getElementById("titleName").textContent = TITLES[idx][1];
        const iconEl = document.getElementById("titleIcon");
        if (iconEl.textContent !== TITLES[idx][2]) {
          iconEl.textContent = TITLES[idx][2];
          iconEl.classList.remove("icon-pop");
          void iconEl.offsetWidth;
          iconEl.classList.add("icon-pop");
        }
        document.getElementById("streakNum").textContent = meta.streak;

        const next = TITLES[idx + 1];
        document.getElementById("nextTitle").textContent = next
          ? "next: " +
            next[1] +
            " at " +
            (BASE_RATING + Math.ceil(next[0] * max))
          : "\u2605 highest title reached";

        if (idx > meta.titleIdx) {
          document.getElementById("toastIcon").textContent = TITLES[idx][2];
          showToast("Promoted to " + TITLES[idx][1] + "!");
          meta.titleIdx = idx;
          saveMeta();
        } else if (idx < meta.titleIdx) {
          document.getElementById("toastIcon").textContent = TITLES[idx][2];
          showToast("Demoted to " + TITLES[idx][1], true);
          meta.titleIdx = idx;
          saveMeta();
        }
      }

      function keyFor(topicIdx, gIdx, pIdx) {
        return `${topicIdx}-${gIdx}-${pIdx}`;
      }

      const openTopics = new Set([0]);

      function render() {
        const wrap = document.getElementById("topics");
        wrap.innerHTML = "";
        let total = 0,
          done = 0;

        DATA.forEach((topic, ti) => {
          let tTotal = 0,
            tDone = 0;
          const tEl = document.createElement("div");
          tEl.className = "topic" + (openTopics.has(ti) ? " open" : "");

          const head = document.createElement("div");
          head.className = "topic-head";
          head.innerHTML = `<span class="chev">▶</span>
      <span class="topic-name">${topic.topic}</span>
      <span class="topic-prog"><b class="tdone">0</b>/<span class="ttot">0</span></span>`;
          head.onclick = () => {
            if (openTopics.has(ti)) openTopics.delete(ti);
            else openTopics.add(ti);
            tEl.classList.toggle("open");
          };
          tEl.appendChild(head);

          const body = document.createElement("div");
          body.className = "topic-body";

          topic.groups.forEach((g, gi) => {
            const gl = document.createElement("div");
            gl.className = "group-label";
            gl.textContent = g.label;
            body.appendChild(gl);

            g.problems.forEach((p, pi) => {
              total++;
              tTotal++;
              const k = keyFor(ti, gi, pi);
              const isDone = !!solved[k];
              if (isDone) {
                done++;
                tDone++;
              }

              const row = document.createElement("div");
              row.className = "row" + (isDone ? " done" : "");
              const dClass =
                p.d === "easy" ? "t-easy" : p.d === "med" ? "t-med" : "t-hard";
              const dLabel =
                p.d === "easy" ? "Easy" : p.d === "med" ? "Medium" : "Hard";
              row.innerHTML = `
          <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#0f1115" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
          <span class="pname">${p.n}</span>
          <span class="tag ${dClass}">${dLabel}</span>
          <a class="lc" href="https://leetcode.com/problemset/?search=${encodeURIComponent(p.n)}" target="_blank" rel="noopener" title="Open on LeetCode">↗</a>
        `;
              row.querySelector(".lc").onclick = (e) => e.stopPropagation();
              row.onclick = (ev) => {
                const nowSolved = !solved[k];
                solved[k] = nowSolved;
                if (nowSolved) {
                  bumpStreak();
                  popPoints(ev, PTS[p.d] || 0, false);
                } else {
                  popPoints(ev, PTS[p.d] || 0, true);
                }
                save();
                render();
              };
              body.appendChild(row);
            });
          });

          tEl.appendChild(body);
          head.querySelector(".tdone").textContent = tDone;
          head.querySelector(".ttot").textContent = tTotal;
          wrap.appendChild(tEl);
        });

        document.getElementById("doneCount").textContent = done;
        document.getElementById("totalCount").textContent = total;
        document.getElementById("overallBar").style.width = total
          ? (done / total) * 100 + "%"
          : "0%";
        renderMeta();
      }

      function save() {
        try {
          localStorage.setItem(STORE_KEY, JSON.stringify(solved));
        } catch (e) {}
      }

      let resetArmed = false,
        resetTimer = null;
      const resetBtn = document.getElementById("resetBtn");
      resetBtn.onclick = () => {
        if (!resetArmed) {
          resetArmed = true;
          resetBtn.textContent = "Sure? Click again";
          resetBtn.style.color = "var(--hard)";
          resetBtn.style.borderColor = "var(--hard)";
          resetTimer = setTimeout(() => {
            resetArmed = false;
            resetBtn.textContent = "Reset all";
            resetBtn.style.color = "";
            resetBtn.style.borderColor = "";
          }, 3000);
          return;
        }
        clearTimeout(resetTimer);
        resetArmed = false;
        resetBtn.textContent = "Reset all";
        resetBtn.style.color = "";
        resetBtn.style.borderColor = "";
        solved = {};
        meta.titleIdx = 0;
        saveMeta();
        save();
        render();
      };

      load();
      render();
    </script>
  </body>
</html>
