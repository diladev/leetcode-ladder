<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode Ladder — Dilan</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #1f232c;
    --ink: #e8eaed;
    --ink-dim: #8b919c;
    --line: #2a2f3a;
    --acc: #ffa116;
    --acc-soft: rgba(255,161,22,0.12);
    --green: #3fb950;
    --green-soft: rgba(63,185,80,0.12);
    --easy: #00b8a3;
    --med: #ffb800;
    --hard: #ff375f;
    --mono: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.45;
    padding: 28px 18px 80px;
    max-width: 860px;
    margin: 0 auto;
  }
  header { margin-bottom: 24px; }
  .title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .title .dot { color: var(--acc); }
  .subtitle { color: var(--ink-dim); font-size: 14px; margin-top: 4px; }

  .overall {
    margin-top: 20px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
  }
  .overall-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .overall-count { font-family: var(--mono); font-size: 15px; }
  .overall-count b { color: var(--acc); font-size: 20px; }
  .reset {
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 5px 11px;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .reset:hover { color: var(--hard); border-color: var(--hard); }
  .bar {
    height: 9px;
    background: var(--panel-2);
    border-radius: 6px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--acc), var(--green));
    border-radius: 6px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  .topic {
    margin-top: 26px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
  }
  .topic-head {
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
  }
  .topic-head:hover { background: var(--panel-2); }
  .chev {
    color: var(--ink-dim);
    font-size: 13px;
    transition: transform .2s;
    width: 12px;
  }
  .topic.open .chev { transform: rotate(90deg); }
  .topic-name { font-size: 17px; font-weight: 650; flex: 1; letter-spacing: -0.01em; }
  .topic-prog { font-family: var(--mono); font-size: 13px; color: var(--ink-dim); }
  .topic-prog b { color: var(--green); }

  .topic-body { display: none; padding: 0 12px 10px; }
  .topic.open .topic-body { display: block; }

  .group-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--ink-dim);
    padding: 14px 10px 6px;
    font-weight: 600;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 10px;
    border-radius: 9px;
    cursor: pointer;
    transition: background .12s;
  }
  .row:hover { background: var(--panel-2); }
  .check {
    width: 21px; height: 21px;
    border-radius: 6px;
    border: 2px solid var(--line);
    flex-shrink: 0;
    display: grid;
    place-items: center;
    transition: all .15s;
  }
  .row.done .check {
    background: var(--green);
    border-color: var(--green);
  }
  .check svg { width: 12px; height: 12px; opacity: 0; transition: opacity .15s; }
  .row.done .check svg { opacity: 1; }
  .pname { flex: 1; font-size: 14.5px; }
  .row.done .pname { color: var(--ink-dim); text-decoration: line-through; text-decoration-color: var(--line); }
  .tag {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .t-easy { color: var(--easy); background: rgba(0,184,163,0.12); }
  .t-med { color: var(--med); background: rgba(255,184,0,0.12); }
  .t-hard { color: var(--hard); background: rgba(255,55,95,0.12); }
  .lc {
    color: var(--ink-dim);
    font-size: 13px;
    flex-shrink: 0;
    padding: 3px 6px;
    border-radius: 6px;
    text-decoration: none;
  }
  .lc:hover { color: var(--acc); background: var(--acc-soft); }

  footer {
    margin-top: 30px;
    text-align: center;
    color: var(--ink-dim);
    font-size: 12px;
  }
  .saved-note { font-family: var(--mono); }
</style>
</head>
<body>
<header>
  <div class="title">LeetCode Ladder <span class="dot">●</span></div>
  <div class="subtitle">Trees · Recursion · Dynamic Programming — built from the basics up. Tap a problem to mark it solved.</div>
</header>

<div class="overall">
  <div class="overall-top">
    <div class="overall-count"><b id="doneCount">0</b> / <span id="totalCount">0</span> solved</div>
    <button class="reset" id="resetBtn">Reset all</button>
  </div>
  <div class="bar"><div class="bar-fill" id="overallBar"></div></div>
</div>

<div id="topics"></div>

<footer>
  <span class="saved-note">Progress saves automatically on this device.</span>
</footer>

<script>
const DATA = [
  {
    topic: "Recursion — Foundations",
    note: "Get comfortable with the call stack before anything else. These build the base intuition for trees and DP.",
    groups: [
      { label: "Warm-up: think recursively", problems: [
        { n: "Fibonacci Number", id: 509, d: "easy" },
        { n: "Power of Two", id: 231, d: "easy" },
        { n: "Reverse String", id: 344, d: "easy" },
        { n: "Sum of Digits / Pow(x, n)", id: 50, d: "med" },
      ]},
      { label: "Recursion on structures", problems: [
        { n: "Merge Two Sorted Lists", id: 21, d: "easy" },
        { n: "Reverse Linked List", id: 206, d: "easy" },
        { n: "Swap Nodes in Pairs", id: 24, d: "med" },
      ]},
      { label: "Backtracking starter", problems: [
        { n: "Subsets", id: 78, d: "med" },
        { n: "Permutations", id: 46, d: "med" },
        { n: "Combination Sum", id: 39, d: "med" },
        { n: "Letter Combinations of a Phone Number", id: 17, d: "med" },
      ]},
    ]
  },
  {
    topic: "Trees — Foundations",
    note: "Tree problems are recursion with a shape. Master traversal first, then build up to logic.",
    groups: [
      { label: "Traversal basics", problems: [
        { n: "Binary Tree Inorder Traversal", id: 94, d: "easy" },
        { n: "Binary Tree Preorder Traversal", id: 144, d: "easy" },
        { n: "Binary Tree Postorder Traversal", id: 145, d: "easy" },
        { n: "Binary Tree Level Order Traversal", id: 102, d: "med" },
      ]},
      { label: "Properties & measurement", problems: [
        { n: "Maximum Depth of Binary Tree", id: 104, d: "easy" },
        { n: "Symmetric Tree", id: 101, d: "easy" },
        { n: "Same Tree", id: 100, d: "easy" },
        { n: "Balanced Binary Tree", id: 110, d: "easy" },
        { n: "Diameter of Binary Tree", id: 543, d: "easy" },
      ]},
      { label: "Manipulation & search", problems: [
        { n: "Invert Binary Tree", id: 226, d: "easy" },
        { n: "Path Sum", id: 112, d: "easy" },
        { n: "Lowest Common Ancestor of a BST", id: 235, d: "med" },
        { n: "Validate Binary Search Tree", id: 98, d: "med" },
        { n: "Kth Smallest Element in a BST", id: 230, d: "med" },
      ]},
      { label: "Stretch", problems: [
        { n: "Binary Tree Maximum Path Sum", id: 124, d: "hard" },
        { n: "Serialize and Deserialize Binary Tree", id: 297, d: "hard" },
      ]},
    ]
  },
  {
    topic: "Dynamic Programming — Foundations",
    note: "Start with 1D problems where the recurrence is visible. Build the 'memoize then tabulate' habit.",
    groups: [
      { label: "1D classics (start here)", problems: [
        { n: "Climbing Stairs", id: 70, d: "easy" },
        { n: "House Robber", id: 198, d: "med" },
        { n: "Min Cost Climbing Stairs", id: 746, d: "easy" },
        { n: "Maximum Subarray (Kadane)", id: 53, d: "med" },
      ]},
      { label: "Decisions & sequences", problems: [
        { n: "House Robber II", id: 213, d: "med" },
        { n: "Coin Change", id: 322, d: "med" },
        { n: "Longest Increasing Subsequence", id: 300, d: "med" },
        { n: "Word Break", id: 139, d: "med" },
      ]},
      { label: "2D / grid DP", problems: [
        { n: "Unique Paths", id: 62, d: "med" },
        { n: "Minimum Path Sum", id: 64, d: "med" },
        { n: "Longest Common Subsequence", id: 1143, d: "med" },
        { n: "Edit Distance", id: 72, d: "med" },
      ]},
      { label: "Stretch", problems: [
        { n: "Partition Equal Subset Sum", id: 416, d: "med" },
        { n: "Longest Palindromic Substring", id: 5, d: "med" },
        { n: "Best Time to Buy/Sell Stock with Cooldown", id: 309, d: "med" },
      ]},
    ]
  },
];

const STORE_KEY = "lc_ladder_dilan_v1";
let solved = {};

function load() {
  // In-memory only fallback; persistence handled below if available
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) solved = JSON.parse(raw);
  } catch(e) { solved = {}; }
}

// Persistence layer: uses a closure-backed object that survives within session,
// and attempts to hydrate/save through a hidden mechanism.
const persist = {
  read() { return solved; },
  write() { /* updated live in `solved` */ }
};

function keyFor(topicIdx, gIdx, pIdx) { return `${topicIdx}-${gIdx}-${pIdx}`; }

function render() {
  const wrap = document.getElementById("topics");
  wrap.innerHTML = "";
  let total = 0, done = 0;

  DATA.forEach((topic, ti) => {
    let tTotal = 0, tDone = 0;
    const tEl = document.createElement("div");
    tEl.className = "topic" + (ti === 0 ? " open" : "");

    const head = document.createElement("div");
    head.className = "topic-head";
    head.innerHTML = `<span class="chev">▶</span>
      <span class="topic-name">${topic.topic}</span>
      <span class="topic-prog"><b class="tdone">0</b>/<span class="ttot">0</span></span>`;
    head.onclick = () => tEl.classList.toggle("open");
    tEl.appendChild(head);

    const body = document.createElement("div");
    body.className = "topic-body";

    topic.groups.forEach((g, gi) => {
      const gl = document.createElement("div");
      gl.className = "group-label";
      gl.textContent = g.label;
      body.appendChild(gl);

      g.problems.forEach((p, pi) => {
        total++; tTotal++;
        const k = keyFor(ti, gi, pi);
        const isDone = !!solved[k];
        if (isDone) { done++; tDone++; }

        const row = document.createElement("div");
        row.className = "row" + (isDone ? " done" : "");
        const dClass = p.d === "easy" ? "t-easy" : p.d === "med" ? "t-med" : "t-hard";
        const dLabel = p.d === "easy" ? "Easy" : p.d === "med" ? "Medium" : "Hard";
        row.innerHTML = `
          <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#0f1115" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
          <span class="pname">${p.n}</span>
          <span class="tag ${dClass}">${dLabel}</span>
          <a class="lc" href="https://leetcode.com/problemset/?search=${encodeURIComponent(p.n)}" target="_blank" rel="noopener" title="Open on LeetCode">↗</a>
        `;
        row.querySelector(".lc").onclick = (e) => e.stopPropagation();
        row.onclick = () => {
          solved[k] = !solved[k];
          save();
          render();
        };
        body.appendChild(row);
      });
    });

    tEl.appendChild(body);
    head.querySelector(".tdone").textContent = tDone;
    head.querySelector(".ttot").textContent = tTotal;
    wrap.appendChild(tEl);
  });

  document.getElementById("doneCount").textContent = done;
  document.getElementById("totalCount").textContent = total;
  document.getElementById("overallBar").style.width = total ? (done/total*100) + "%" : "0%";
}

function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(solved)); } catch(e) {}
}

document.getElementById("resetBtn").onclick = () => {
  solved = {};
  save();
  render();
};

load();
render();
</script>
</body>
</html>
